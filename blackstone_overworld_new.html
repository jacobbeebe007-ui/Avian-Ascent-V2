<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blackstone Forest — Avian Ascent</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a020;--gold-l:#f0d060;--gold-d:#8a6010;--parch:#d4c090;--mist:#8aaa98;}
html,body{width:100%;height:100%;overflow:hidden;background:#060d05;}
#root{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;outline:none;}
#hdr{flex-shrink:0;height:52px;z-index:10;position:relative;background:linear-gradient(180deg,#020402,#080c06);border-bottom:1px solid var(--gold-d);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
#hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),#f0d060,var(--gold),transparent);}
#hdr h1{font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;color:var(--gold-l);letter-spacing:3px;text-shadow:0 0 18px rgba(200,160,32,.5),0 2px 4px rgba(0,0,0,.9);}
.orn{color:var(--gold);opacity:.6;margin:0 10px;font-size:16px;}
#hdr-hint{font-family:'EB Garamond',serif;font-size:12px;color:var(--gold-d);letter-spacing:1px;font-style:italic;}
#hdr-bird-btn{display:flex;align-items:center;gap:8px;cursor:pointer;background:rgba(200,160,32,.06);border:1px solid rgba(200,160,32,.22);padding:5px 10px;transition:all .2s;}
#hdr-bird-btn:hover{background:rgba(200,160,32,.14);border-color:rgba(200,160,32,.45);}
#hdr-bird-btn span{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:1px;}
#vp{flex:1;overflow:hidden;position:relative;cursor:grab;}
#vp.panning{cursor:grabbing;}
#scaler{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}
#mw{position:absolute;top:0;left:0;width:1536px;height:1024px;}
#bg-img{position:absolute;top:0;left:0;width:1536px;height:1024px;display:block;}
#node-svg{position:absolute;top:0;left:0;width:1536px;height:1024px;display:block;}
#player{position:absolute;z-index:30;pointer-events:none;transition:left .5s cubic-bezier(.25,.46,.45,.94),top .5s cubic-bezier(.25,.46,.45,.94);}
#player-portrait{width:52px;height:52px;border:2px solid var(--gold);border-radius:50%;background:#0a1808;overflow:hidden;box-shadow:0 0 12px rgba(200,160,32,.75),0 0 28px rgba(200,160,32,.35),0 4px 12px rgba(0,0,0,.9);}
#player-portrait svg{display:block;width:100%;height:100%;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes dash{0%,100%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(1.4) scaleY(.7) skewX(-8deg)}}
@keyframes arrive{0%{transform:scale(.65);opacity:.3}65%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.idle #player-portrait{animation:float 2.5s ease-in-out infinite;}
.moving #player-portrait{animation:dash .14s ease-in-out infinite;}
.arrive #player-portrait{animation:arrive .4s cubic-bezier(.175,.885,.32,1.275) forwards;}
#mm-wrap{position:absolute;top:10px;right:10px;z-index:20;background:rgba(2,4,2,.95);border:1px solid rgba(200,160,32,.28);}
#mm-wrap::before{content:'MAP';position:absolute;top:3px;left:5px;z-index:2;font-family:'Cinzel',serif;font-size:7px;color:rgba(200,160,32,.28);letter-spacing:2px;}
#zoom-ctrl{position:absolute;bottom:12px;left:12px;z-index:20;display:flex;flex-direction:column;align-items:center;gap:4px;}
.zbtn{width:30px;height:30px;cursor:pointer;background:rgba(2,4,2,.92);border:1px solid rgba(200,160,32,.28);color:var(--gold);font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;transition:all .15s;}
.zbtn:hover{background:rgba(200,160,32,.14);border-color:var(--gold);}
#zlabel{font-family:'Cinzel',serif;font-size:8px;color:var(--gold-d);letter-spacing:1px;padding:2px 6px;background:rgba(2,4,2,.88);border:1px solid rgba(200,160,32,.16);min-width:36px;text-align:center;}
#panel{flex-shrink:0;height:154px;z-index:10;position:relative;background:linear-gradient(180deg,#040804,#080d06);border-top:1px solid var(--gold-d);display:flex;align-items:stretch;overflow:hidden;}
#panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-l),var(--gold),transparent);}
#p-portrait{flex-shrink:0;width:138px;background:linear-gradient(135deg,#030603,#0a1207);border-right:1px solid rgba(200,160,32,.14);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px;position:relative;}
#p-portrait::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(200,160,32,.05) 0%,transparent 70%);}
#p-frame{width:92px;height:92px;border-radius:50%;border:2px solid var(--gold);background:#060e05;overflow:hidden;box-shadow:0 0 16px rgba(200,160,32,.38),inset 0 0 18px rgba(0,0,0,.5);position:relative;z-index:1;}
#p-frame svg{width:100%;height:100%;display:block;}
#p-name{font-family:'Cinzel',serif;font-size:7px;color:var(--gold);letter-spacing:2px;position:relative;z-index:1;text-transform:uppercase;}
#p-info{flex:1;padding:12px 16px;display:flex;flex-direction:column;justify-content:center;gap:5px;min-width:0;}
#i-label{font-family:'Cinzel',serif;font-size:7px;color:var(--gold-d);letter-spacing:3px;text-transform:uppercase;}
#i-name{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--gold-l);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#i-terrain{font-family:'EB Garamond',serif;font-size:12px;font-style:italic;color:var(--mist);}
#i-enemies{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px;}
#i-enemies .el{font-family:'Cinzel',serif;font-size:7px;color:var(--gold-d);letter-spacing:2px;}
.ec{font-family:'EB Garamond',serif;font-size:11px;background:rgba(200,160,32,.07);border:1px solid rgba(200,160,32,.18);color:var(--parch);padding:1px 7px;}
.ec.boss{background:rgba(139,26,26,.14);border-color:rgba(200,80,80,.28);color:#ff9090;}
#p-nav{flex-shrink:0;width:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:10px;border-left:1px solid rgba(200,160,32,.1);}
.nbtn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;background:rgba(200,160,32,.06);border:1px solid rgba(200,160,32,.22);color:var(--gold);padding:6px 12px;cursor:pointer;width:100%;text-align:center;transition:all .2s;}
.nbtn:hover:not(:disabled){background:rgba(200,160,32,.15);border-color:var(--gold);}
.nbtn:disabled{opacity:.16;cursor:default;}
#enter-btn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;padding:8px 12px;cursor:pointer;width:100%;text-align:center;border:1px solid;transition:all .2s;display:none;}
#enter-btn:hover{filter:brightness(1.3);}
#ov{display:none;position:fixed;inset:0;z-index:100;background:rgba(2,4,2,.97);flex-direction:column;align-items:center;justify-content:center;gap:13px;cursor:pointer;}
#ov.on{display:flex;}
#ov-frame{border:1px solid var(--gold-d);padding:28px 36px;display:flex;flex-direction:column;align-items:center;gap:11px;background:linear-gradient(135deg,#050905,#090e07);box-shadow:0 0 36px rgba(200,160,32,.12);position:relative;}
#ov-frame::before,#ov-frame::after{content:'❧';position:absolute;color:var(--gold-d);font-size:18px;opacity:.4;}
#ov-frame::before{top:7px;left:10px;}#ov-frame::after{bottom:7px;right:10px;transform:rotate(180deg);}
#ov-port{width:128px;height:128px;border-radius:50%;border:2px solid var(--gold);background:#060e05;overflow:hidden;box-shadow:0 0 20px rgba(200,160,32,.45);}
#ov-port svg{width:100%;height:100%;display:block;}
.ov-lbl{font-family:'Cinzel',serif;font-size:8px;color:var(--gold-d);letter-spacing:5px;}
#ov-name{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--gold-l);letter-spacing:2px;margin-top:3px;text-align:center;}
#ov-loc{font-family:'EB Garamond',serif;font-size:12px;font-style:italic;color:var(--mist);}
#ov-enemies{font-family:'EB Garamond',serif;font-size:12px;color:var(--parch);text-align:center;line-height:2.2;}
.ov-dismiss{font-family:'Cinzel',serif;font-size:7px;color:rgba(200,160,32,.22);margin-top:4px;letter-spacing:3px;}
#ov-confirm-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;padding:10px 30px;cursor:pointer;border:1px solid var(--gold-d);background:rgba(200,160,32,.08);color:var(--gold);transition:all .2s;margin-top:10px;display:none;}
#ov-confirm-btn:hover{background:rgba(200,160,32,.22);border-color:var(--gold);color:var(--gold-l);}
#ov-confirm-btn.is-shop{border-color:#988028;color:#f0c020;}#ov-confirm-btn.is-shop:hover{background:rgba(152,128,40,.2);}
#ov-confirm-btn.is-boss{border-color:#882020;color:#ff9090;}#ov-confirm-btn.is-boss:hover{background:rgba(136,32,32,.2);}
#ov-confirm-btn:disabled{opacity:.35;cursor:not-allowed;}
.node-done>circle:first-of-type,.node-done>ellipse{opacity:.35!important;}
.node-done .node-label-txt{fill:rgba(136,112,48,.3)!important;}
#pick{display:none;position:fixed;inset:0;z-index:110;background:rgba(2,4,2,.98);flex-direction:column;align-items:center;padding:18px;gap:10px;overflow-y:auto;}
#pick.on{display:flex;}
#pick h2{font-family:'Cinzel Decorative',serif;font-size:12px;color:var(--gold-l);letter-spacing:3px;}
#pick-div{width:260px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
#pick-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:840px;}
.bc{background:linear-gradient(135deg,#050905,#0b1508);border:1px solid rgba(200,160,32,.18);padding:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;width:88px;transition:all .2s;}
.bc:hover{border-color:var(--gold);}.bc.sel{border-color:var(--gold-l);}
.bc .cp{width:54px;height:54px;border-radius:50%;border:1px solid rgba(200,160,32,.25);background:#060e05;overflow:hidden;}
.bc .cp svg{width:100%;height:100%;display:block;}
.bc span{font-family:'Cinzel',serif;font-size:6px;color:var(--gold);letter-spacing:1px;text-align:center;}
#pick-ok{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;background:rgba(200,160,32,.07);border:1px solid var(--gold-d);color:var(--gold);padding:9px 22px;cursor:pointer;margin-top:4px;transition:all .2s;}
#pick-ok:hover{background:rgba(200,160,32,.16);border-color:var(--gold);}

/* ── Nest button ─────────────────────────────────────────────── */
#hdr-nest-btn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;background:rgba(200,160,32,.06);border:1px solid rgba(200,160,32,.22);color:var(--gold);padding:5px 14px;cursor:pointer;transition:all .2s;white-space:nowrap;}
#hdr-nest-btn:hover{background:rgba(200,160,32,.18);border-color:var(--gold);}
#hdr-shiny-count{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:1px;background:rgba(200,160,32,.06);border:1px solid rgba(200,160,32,.22);padding:5px 10px;white-space:nowrap;}

/* ── Mobile layout ───────────────────────────────────────────── */
@media (max-width:640px){
  html,body,#root{height:100%;min-height:0;}
  #root{height:calc(var(--vh,1vh)*100);}
  #hdr{height:44px;padding:0 10px;gap:6px;}
  #hdr h1{font-size:10px;letter-spacing:1px;}
  .orn{margin:0 4px;font-size:12px;}
  #hdr-hint{display:none;}
  #hdr-bird-btn{padding:4px 8px;}
  #hdr-bird-btn span{font-size:8px;}
  #hdr-bird-img{width:22px;height:22px;}
  #hdr-nest-btn{font-size:7px;padding:4px 8px;letter-spacing:1px;}
  #hdr-shiny-count{font-size:8px;padding:4px 6px;}
  /* Map viewport fills remaining space above bottom nav */
  #vp{flex:1;min-height:0;}
  /* Panel becomes a slim row + full-width nav bar below it */
  #panel{height:auto;flex-wrap:wrap;}
  #p-portrait{width:72px;padding:6px;}
  #p-frame{width:54px;height:54px;}
  #p-name{font-size:6px;}
  #p-info{padding:8px 10px;}
  #i-name{font-size:12px;}
  #p-nav{
    width:100%;
    flex-direction:row;
    justify-content:stretch;
    height:52px;
    gap:8px;
    padding:8px 12px;
    border-left:none;
    border-top:1px solid rgba(200,160,32,.18);
    background:rgba(4,8,4,.96);
  }
  .nbtn{flex:1;padding:8px 4px;font-size:8px;}
  #enter-btn{flex:1.6;padding:8px 4px;font-size:8px;}
  /* Minimap: smaller + shifted */
  #mm-wrap{top:6px;right:6px;}
  /* Zoom controls: smaller */
  .zbtn{width:26px;height:26px;font-size:14px;}
  #zoom-ctrl{bottom:8px;left:8px;}
}
</head>

const mc=document.getElementById('mm'),mc2=mc.getContext('2d');
const MM_W=164,MM_H=110;
const mmx=x=>x/MAP_W*MM_W,mmy=y=>y/MAP_H*MM_H;
let _cx=0,_cy=0,zoom=0.65,ZOOM_MIN=0.25,ZOOM_MAX=1.8,ZOOM_STEP=0.1;

function drawMM(){
  mc2.clearRect(0,0,MM_W,MM_H);mc2.fillStyle='#020402';mc2.fillRect(0,0,MM_W,MM_H);
  NODES.slice(0,-1).forEach((n,i)=>{const nx2=NODES[i+1],lit=i<UNLOCKED;mc2.beginPath();mc2.moveTo(mmx(n.x),mmy(n.y));mc2.lineTo(mmx(nx2.x),mmy(nx2.y));mc2.strokeStyle=lit?'#887018':'#383828';mc2.lineWidth=lit?1.5:.6;mc2.globalAlpha=lit?.68:.25;mc2.stroke();mc2.globalAlpha=1;});
  NODES.forEach(n=>{const vc2=nvc(n),r2=n.final?4.5:n.type==='boss'?4:n.type==='shop'?3.5:3;mc2.beginPath();mc2.arc(mmx(n.x),mmy(n.y),r2,0,Math.PI*2);mc2.fillStyle=n.id<=UNLOCKED?vc2.ring:'#383828';mc2.globalAlpha=n.id<=UNLOCKED?.82:.28;mc2.fill();mc2.globalAlpha=1;});
  const vp=document.getElementById('vp'),vw=vp.offsetWidth||900,vh=vp.offsetHeight||420;
  mc2.strokeStyle='rgba(200,160,32,.32)';mc2.lineWidth=.8;mc2.strokeRect(mmx(_cx),mmy(_cy),mmx(vw/zoom),mmy(vh/zoom));
  const cn=NODES[curPos];mc2.beginPath();mc2.arc(mmx(cn.x),mmy(cn.y),5,0,Math.PI*2);mc2.fillStyle='#e0d030';mc2.fill();
}

let curPos=0,birdIdx=0,isMoving=false,moveTimer=null;
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

function applyCamera(anim){
  const sc=document.getElementById('scaler'),mw=document.getElementById('mw');
  const tr=anim?'transform .5s cubic-bezier(.25,.46,.45,.94)':'none';
  sc.style.transition=tr;mw.style.transition=anim?'transform .5s cubic-bezier(.25,.46,.45,.94)':'none';
  sc.style.transform=`scale(${zoom})`;mw.style.transform=`translate(${-_cx}px,${-_cy}px)`;
  document.getElementById('zlabel').textContent=Math.round(zoom*100)+'%';drawMM();
}

function updateCamera(anim=true){
  const n=NODES[curPos],vp=document.getElementById('vp');
  const vw=vp.offsetWidth||900,vh=vp.offsetHeight||420;
  _cx=clamp(n.x-vw/zoom/2,0,MAP_W-vw/zoom);_cy=clamp(n.y-vh/zoom/2,0,MAP_H-vh/zoom);
  const pl=document.getElementById('player');pl.style.left=(n.x-26)+'px';pl.style.top=(n.y-60)+'px';
  applyCamera(anim);
}

function setZoom(nz,ox,oy){
  const vp=document.getElementById('vp'),vw=vp.offsetWidth||900,vh=vp.offsetHeight||420;
  ox=ox??vw/2;oy=oy??vh/2;
  const mapX=ox/zoom+_cx,mapY=oy/zoom+_cy;zoom=clamp(nz,ZOOM_MIN,ZOOM_MAX);
  _cx=clamp(mapX-ox/zoom,0,MAP_W-vw/zoom);_cy=clamp(mapY-oy/zoom,0,MAP_H-vh/zoom);applyCamera(true);
}

  const nm=document.getElementById('i-name');nm.textContent=n.name;nm.style.color=n.final?'#e890ff':n.type==='boss'?'#ff9090':'var(--gold-l)';

  if(bk&&SPRITES[bk]){pimg.src=SPRITES[bk];pimg.style.borderRadius='0';document.getElementById('p-name').textContent=(n.enemies&&n.enemies[0]||'').toUpperCase();}
  else if(n.type==='shop'){pimg.src='';pimg.style.borderRadius='0';document.getElementById('p-frame').innerHTML='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:32px;color:#c89010;">$</div>';document.getElementById('p-name').textContent='EMPORIUM';}
  else{pimg.src=SPRITES[BIRDS[birdIdx].k]||'';pimg.style.borderRadius='0';document.getElementById('p-name').textContent=BIRDS[birdIdx].n.toUpperCase();}
  const eb=document.getElementById('enter-btn');
  if(n.type==='start'){eb.style.display='none';}
  else{eb.style.display='block';const isBoss=n.type==='boss'||n.final,isShop=n.type==='shop';eb.style.background=n.final?'rgba(120,32,160,.14)':isBoss?'rgba(160,40,32,.12)':isShop?'rgba(200,160,32,.1)':'rgba(120,100,32,.08)';eb.style.borderColor=vc.ring;eb.style.color=n.final?'#e890ff':isBoss?'#ff9090':isShop?'#f0c020':'#d4b040';eb.textContent=isShop?'ENTER SHOP \u25B6':isBoss?'FACE BOSS \u25B6':'ENTER STAGE \u25B6';}
  document.getElementById('btn-prev').disabled=curPos<=0;
  document.getElementById('btn-next').disabled=curPos>=UNLOCKED||nodeBlocksAdvance(NODES[curPos]);
}

function setHL(id,on){const n=NODES[id];if(!n||!n._sh)return;n._sh.setAttribute('stroke-width',on?3.5:2);if(n._topRing)n._topRing.setAttribute('stroke-width',on?3.5:2);}
function setPos(nId){if(isMoving||nId===curPos)return;isMoving=true;setHL(curPos,false);curPos=nId;setHL(curPos,true);const pl=document.getElementById('player');pl.className='moving';updateCamera(true);updateInfo();clearTimeout(moveTimer);moveTimer=setTimeout(()=>{isMoving=false;pl.className='arrive';setTimeout(()=>{pl.className='idle';},500);},520);}
function openOv(){const n=NODES[curPos],vc=nvc(n);if(n.type==='start')return;const bk=NODE_BIRDS[n.id];document.getElementById('ov-img').src=bk&&SPRITES[bk]?SPRITES[bk]:(SPRITES[BIRDS[birdIdx].k]||'');document.getElementById('ov-frame').style.borderColor=vc.ring;document.getElementById('ov-name').textContent=n.name;document.getElementById('ov-name').style.color=n.final?'#e890ff':n.type==='boss'?'#ff9090':'var(--gold-l)';document.getElementById('ov-loc').textContent=n.terrain?'\u2767 '+n.terrain:'';const oe=document.getElementById('ov-enemies');oe.innerHTML='';if(n.enemies)n.enemies.forEach(e=>{const d=document.createElement('div');d.textContent=e;d.style.color=(n.type==='boss'||n.final)?'#ff9090':'var(--parch)';oe.appendChild(d);});document.getElementById('ov').classList.add('on');}
document.getElementById('ov').addEventListener('click',()=>document.getElementById('ov').classList.remove('on'));
document.getElementById('enter-btn').addEventListener('click',openOv);

const pg=document.getElementById('pick-grid');
BIRDS.forEach((b,i)=>{const c=document.createElement('div');c.className='bc'+(i===0?' sel':'');const pf=document.createElement('div');pf.className='cp';const ps=document.createElement('img');ps.src=SPRITES[b.k]||'';ps.alt=b.n;ps.style.cssText='width:100%;height:100%;object-fit:contain;image-rendering:pixelated;';pf.appendChild(ps);const lb=document.createElement('span');lb.textContent=b.n;c.appendChild(pf);c.appendChild(lb);c.addEventListener('click',()=>{pg.querySelectorAll('.bc').forEach(x=>x.classList.remove('sel'));c.classList.add('sel');birdIdx=i;applyBird();});pg.appendChild(c);});
function applyBird(){const b=BIRDS[birdIdx];const src=SPRITES[b.k]||'';document.getElementById('player-img').src=src;document.getElementById('hdr-bird-img').src=src;document.getElementById('hdr-bird-name').textContent=b.n.toUpperCase();}
document.getElementById('hdr-bird-btn').addEventListener('click',()=>document.getElementById('pick').classList.add('on'));

const vp=document.getElementById('vp');
vp.addEventListener('wheel',e=>{e.preventDefault();const r=vp.getBoundingClientRect();setZoom(zoom+(e.deltaY>0?-ZOOM_STEP:ZOOM_STEP),e.clientX-r.left,e.clientY-r.top);},{passive:false});
document.getElementById('zin').addEventListener('click',()=>setZoom(zoom+ZOOM_STEP));
document.getElementById('zout').addEventListener('click',()=>setZoom(zoom-ZOOM_STEP));
let _pd=0;
vp.addEventListener('touchstart',e=>{if(e.touches.length===2){_pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);e.preventDefault();}},{passive:false});
vp.addEventListener('touchmove',e=>{if(e.touches.length===2&&_pd>0){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const r=vp.getBoundingClientRect();setZoom(zoom*(d/_pd),(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,(e.touches[0].clientY+e.touches[1].clientY)/2-r.top);_pd=d;}},{passive:false});
vp.addEventListener('touchend',()=>{_pd=0;});
let _dr=false,_dsx=0,_dsy=0,_dcx=0,_dcy=0;
vp.addEventListener('mousedown',e=>{if(e.button!==0)return;if(e.target.closest('button,.zbtn,#mm-wrap'))return;_dr=true;_dsx=e.clientX;_dsy=e.clientY;_dcx=_cx;_dcy=_cy;vp.classList.add('panning');document.getElementById('scaler').style.transition='none';document.getElementById('mw').style.transition='none';e.preventDefault();});
window.addEventListener('mousemove',e=>{if(!_dr)return;const dx=(e.clientX-_dsx)/zoom,dy=(e.clientY-_dsy)/zoom;const vpEl=document.getElementById('vp'),vw=vpEl.offsetWidth||900,vh=vpEl.offsetHeight||420;_cx=clamp(_dcx-dx,0,MAP_W-vw/zoom);_cy=clamp(_dcy-dy,0,MAP_H-vh/zoom);document.getElementById('mw').style.transform=`translate(${-_cx}px,${-_cy}px)`;drawMM();});
window.addEventListener('mouseup',()=>{if(!_dr)return;_dr=false;vp.classList.remove('panning');document.getElementById('scaler').style.transition='transform .5s cubic-bezier(.25,.46,.45,.94)';document.getElementById('mw').style.transition='transform .5s cubic-bezier(.25,.46,.45,.94)';});
document.getElementById('root').addEventListener('keydown',e=>{
  if(document.getElementById('pick').classList.contains('on')){if(e.key==='Escape'){document.getElementById('pick').classList.remove('on');document.getElementById('root').focus();}return;}
  if(document.getElementById('ov').classList.contains('on')){if(e.key==='Escape')document.getElementById('ov').classList.remove('on');return;}
  if(e.key==='b'||e.key==='B'){document.getElementById('hdr-bird-btn').click();return;}
  if(e.key==='='||e.key==='+'){e.preventDefault();setZoom(zoom+ZOOM_STEP);return;}
  if(e.key==='-'){e.preventDefault();setZoom(zoom-ZOOM_STEP);return;}
  if(e.key==='0'){e.preventDefault();zoom=0.65;updateCamera(true);return;}
  if((e.key==='Enter'||e.key===' ')&&!isMoving){e.preventDefault();openOv();return;}
  const dirs=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
  if(!dirs.includes(e.key))return;e.preventDefault();if(isMoving)return;
  const cn=NODES[curPos],cands=[];
  if(curPos>0)cands.push(NODES[curPos-1]);if(curPos<UNLOCKED)cands.push(NODES[curPos+1]);
  if(!cands.length)return;let best=null,bs=-Infinity;
  for(const c of cands){const dx=c.x-cn.x,dy=c.y-cn.y;const sc=e.key==='ArrowRight'?dx-Math.abs(dy)*.4:e.key==='ArrowLeft'?-dx-Math.abs(dy)*.4:e.key==='ArrowUp'?-dy-Math.abs(dx)*.4:dy-Math.abs(dx)*.4;if(sc>bs){bs=sc;best=c.id;}}
  if(best!==null)setPos(best);
});
document.getElementById('root').addEventListener('mousedown',()=>document.getElementById('root').focus());
// Returns true if the current node must be cleared before advancing
function nodeBlocksAdvance(n){
  if(!n) return false;
  if(n.type==='start'||n.type==='shop') return false;
  // stage/boss/final: must be completed (stage < currentCompletedStage)
  return typeof n.stage==='number' && n.stage >= currentCompletedStage;
}

document.getElementById('btn-prev').addEventListener('click',()=>{if(curPos>0&&!isMoving)setPos(curPos-1);});
document.getElementById('btn-next').addEventListener('click',()=>{
  if(isMoving||curPos>=UNLOCKED) return;
  if(nodeBlocksAdvance(NODES[curPos])){
    // Flash the enter button to hint the player should clear this node first
    const eb=document.getElementById('enter-btn');
    if(eb&&eb.style.display!=='none'){eb.style.outline='2px solid var(--gold)';setTimeout(()=>{eb.style.outline='';},600);}
    return;
  }
  setPos(curPos+1);
});

document.getElementById('hdr-nest-btn').addEventListener('click',()=>{
  // Save overworld state and return to main menu; run state is preserved
  try{
    const owRaw=localStorage.getItem('avianAscent_overworld');
    if(owRaw){
      const ow=JSON.parse(owRaw);
      ow.nodeId=curPos;
      localStorage.setItem('avianAscent_overworld',JSON.stringify(ow));
    }
  }catch(_){}
  window.location.href='index.html';
});

applyBird();
const pl=document.getElementById('player');pl.style.transition='none';
pl.style.left=(NODES[0].x-26)+'px';pl.style.top=(NODES[0].y-60)+'px';
setHL(0,true);updateInfo();
const vpInit=document.getElementById('vp');
_cx=clamp(NODES[0].x-(vpInit.offsetWidth||900)/zoom/2,0,MAP_W);
_cy=clamp(NODES[0].y-(vpInit.offsetHeight||420)/zoom/2,0,MAP_H);
applyCamera(false);
requestAnimationFrame(()=>requestAnimationFrame(()=>{pl.style.transition='left .5s cubic-bezier(.25,.46,.45,.94),top .5s cubic-bezier(.25,.46,.45,.94)';document.getElementById('root').focus();}));
</script>
<script>
// ── Avian Ascent · Overworld Integration Bootstrap ───────────────────────────
(function(){
  const SAVE_KEY = 'avianAscent_save_v1';
  const OW_KEY   = 'avianAscent_overworld';
  const NAV_KEY  = 'avianAscent_nav';

  // ── Read persisted state ──────────────────────────────────────────────────
  let save = null;
  try { save = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); } catch(_) {}
  let owState = null;
  try { owState = JSON.parse(localStorage.getItem(OW_KEY) || 'null'); } catch(_) {}

  const activeBirdKey  = save?.player?.birdKey || owState?.birdKey || null;
  const currentStage   = save?.stage || 1;           // next stage to fight (1-20)
  const shinyObjects   = save ? (save.shinyObjects || 0) : null;
  const hasActiveRun   = !!(save?.player);

  // ── Apply the player's bird as the overworld sprite ──────────────────────
  if (activeBirdKey) {
    const idx = BIRDS.findIndex(b => b.k === activeBirdKey);
    if (idx >= 0) {
      birdIdx = idx;
      applyBird();
    } else if (SPRITES[activeBirdKey]) {
      // Sprite exists but no BIRDS array entry (shouldn't happen after full sync)
      const src = SPRITES[activeBirdKey];
      const label = activeBirdKey.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase()).trim();
      document.getElementById('player-img').src = src;
      document.getElementById('hdr-bird-img').src = src;
      document.getElementById('hdr-bird-name').textContent = label.toUpperCase();
    }
  }

  // ── Lock the standalone bird-picker when a run is active ─────────────────
  if (hasActiveRun) {
    const hdrBtn = document.getElementById('hdr-bird-btn');
    if (hdrBtn) {
      const locked = hdrBtn.cloneNode(true);
      locked.style.cursor = 'default';
      locked.title = 'Bird locked during run';
      // no click handler — no-op
      hdrBtn.parentNode.replaceChild(locked, hdrBtn);
    }
  }

  // ── Expose completed stage count to the global movement-gating logic ────
  currentCompletedStage = currentStage;

  // ── Update shinies counter in the static header element ─────────────────
  const shinyEl = document.getElementById('hdr-shiny-count');
  if (shinyEl && shinyObjects !== null) {
    shinyEl.textContent = '\u2B50 ' + shinyObjects;
  }

  // ── Determine which node a stage maps to ─────────────────────────────────
  function nodeForStage(stageNum) {
    return NODES.find(n => n.stage === stageNum) || null;
  }

  // Can the player actually enter this node right now?
  function isActionable(n) {
    if (!n || n.type === 'start') return false;
    if (n.type === 'stage' || n.type === 'boss' || n.final) {
      return n.stage === currentStage;
    }
    if (n.type === 'shop') {
      // A shop sits between two stage nodes. It's open when the stage
      // immediately before it has been beaten (currentStage equals the
      // stage of the node right after the shop).
      const prev = NODES[n.id - 1];
      const next = NODES[n.id + 1];
      if (prev && next) {
        return currentStage >= (prev.stage || 0) + 1 &&
               currentStage <= (next.stage || 99);
      }
    }
    return false;
  }

  // ── Position player at the current-stage node ─────────────────────────────
  let startNode = owState?.nodeId != null ? owState.nodeId : 0;
  if (startNode === 0 && currentStage > 1) {
    const target = nodeForStage(currentStage);
    if (target) startNode = target.id;
  }
  if (startNode !== 0) {
    const pl = document.getElementById('player');
    pl.style.transition = 'none';
    setHL(0, false);
    curPos = startNode;
    const n = NODES[curPos];
    pl.style.left = (n.x - 26) + 'px';
    pl.style.top  = (n.y - 60) + 'px';
    setHL(curPos, true);
    updateCamera(false);
    updateInfo();
    requestAnimationFrame(() => requestAnimationFrame(() => {
      pl.style.transition = 'left .5s cubic-bezier(.25,.46,.45,.94),top .5s cubic-bezier(.25,.46,.45,.94)';
    }));
  }

  // ── Mark completed stage nodes with a ✓ checkmark ────────────────────────
  if (currentStage > 1) {
    NODES.forEach(n => {
      if (n.type === 'stage' && n.stage < currentStage && n._g) {
        n._g.classList.add('node-done');
        const tick = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        tick.setAttribute('x', String(n.x));
        tick.setAttribute('y', String(n.y - 22));
        tick.setAttribute('text-anchor', 'middle');
        tick.setAttribute('font-family', 'Cinzel,serif');
        tick.setAttribute('font-size', '10');
        tick.setAttribute('fill', 'rgba(200,160,32,.5)');
        tick.textContent = '\u2713';
        n._g.appendChild(tick);
      }
    });
  }

  // ── Wire the confirm button (navigation to index.html) ───────────────────
  const confirmBtn = document.getElementById('ov-confirm-btn');

  if (confirmBtn) {
    confirmBtn.addEventListener('click', function(e) {
      e.stopPropagation(); // don't dismiss the overlay backdrop
      const n = NODES[curPos];
      if (!n || !isActionable(n)) return;

      // Persist the current overworld position for when we return
      try {
        localStorage.setItem(OW_KEY, JSON.stringify({nodeId: curPos, birdKey: activeBirdKey}));
      } catch(_) {}

      if (n.type === 'shop') {
        try { localStorage.setItem(NAV_KEY, JSON.stringify({action:'shop', nodeId:curPos})); } catch(_) {}
      } else {
        // Stage or boss — write the target stage number into the save so
        // handleOverworldReturn() in game.js fights the right enemy.
        if (save) {
          const fresh = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}');
          fresh.stage = n.stage;
          try { localStorage.setItem(SAVE_KEY, JSON.stringify(fresh)); } catch(_) {}
        }
        try {
          localStorage.setItem(NAV_KEY, JSON.stringify({action:'battle', nodeId:curPos, stage:n.stage}));
        } catch(_) {}
      }

      window.location.href = 'index.html';
    });
  }

  // ── Replace #enter-btn handler: show overlay AND update confirm button ────
  (function() {
    const old = document.getElementById('enter-btn');
    if (!old) return;
    const fresh = old.cloneNode(true); // removes existing listener
    old.parentNode.replaceChild(fresh, old);

    fresh.addEventListener('click', function() {
      openOv(); // existing overlay open
      if (!confirmBtn) return;
      const n = NODES[curPos];
      const ok = isActionable(n);
      confirmBtn.style.display = ok ? 'block' : 'none';
      confirmBtn.disabled = !ok;
      confirmBtn.className = '';
      if (ok) {
        if (n.type === 'shop')
          { confirmBtn.textContent = 'ENTER SHOP \u25B6'; confirmBtn.classList.add('is-shop'); }
        else if (n.type === 'boss' || n.final)
          { confirmBtn.textContent = 'FACE BOSS \u25B6'; confirmBtn.classList.add('is-boss'); }
        else
          { confirmBtn.textContent = 'ENTER STAGE ' + n.stage + ' \u25B6'; }
      }
    });
  })();

  // ── Keep ESC closing the overlay ──────────────────────────────────────────
  // (already handled by the existing keyboard listener — no changes needed)

})();
</script>
