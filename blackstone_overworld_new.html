<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blackstone Forest — Avian Ascent</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a020;--gold-l:#f0d060;--gold-d:#8a6010;--parch:#d4c090;--mist:#8aaa98;}
html,body{width:100%;height:100%;overflow:hidden;background:#060d05;}
#root{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;outline:none;}
#hdr{flex-shrink:0;height:52px;z-index:10;position:relative;background:linear-gradient(180deg,#020402,#080c06);border-bottom:1px solid var(--gold-d);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:0 20px;}
.hdr-title-wrap{display:flex;align-items:center;justify-self:start;}
#hdr-hint{justify-self:center;text-align:center;}
.hdr-spacer{justify-self:end;min-width:0;}
#hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),#f0d060,var(--gold),transparent);}
#hdr h1{font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;color:var(--gold-l);letter-spacing:3px;text-shadow:0 0 18px rgba(200,160,32,.5),0 2px 4px rgba(0,0,0,.9);}
.orn{color:var(--gold);opacity:.6;margin:0 10px;font-size:16px;}
#hdr-hint{font-family:'EB Garamond',serif;font-size:12px;color:var(--gold-d);letter-spacing:1px;font-style:italic;}
#hdr-bird-btn{display:flex;align-items:center;gap:8px;cursor:pointer;background:rgba(200,160,32,.06);border:1px solid rgba(200,160,32,.22);padding:5px 10px;transition:all .2s;}
#hdr-bird-btn:hover{background:rgba(200,160,32,.14);border-color:rgba(200,160,32,.45);}
#hdr-bird-btn span{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:1px;}
#vp{flex:1;overflow:hidden;position:relative;cursor:grab;}
#vp.panning{cursor:grabbing;}
#scaler{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform,left,top;}
#mw{position:absolute;top:0;left:0;width:1536px;height:1024px;}
#bg-img{position:absolute;top:0;left:0;width:1536px;height:1024px;display:block;}
/* Sprite-sheet frame 0 (top-left quadrant) for all overworld portrait divs */
#hdr-bird-img,#player-img,#p-img,#ov-img{background-size:200% 200%;background-position:0% 0%;background-repeat:no-repeat;image-rendering:pixelated;}
#node-svg{position:absolute;top:0;left:0;width:1536px;height:1024px;display:block;}
#player{position:absolute;z-index:30;pointer-events:none;transition:left .5s cubic-bezier(.25,.46,.45,.94),top .5s cubic-bezier(.25,.46,.45,.94);}
#player-portrait{width:52px;height:52px;border:2px solid var(--gold);border-radius:50%;background:#0a1808;overflow:hidden;box-shadow:0 0 12px rgba(200,160,32,.75),0 0 28px rgba(200,160,32,.35),0 4px 12px rgba(0,0,0,.9);}
#player-portrait svg{display:block;width:100%;height:100%;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes dash{0%,100%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(1.4) scaleY(.7) skewX(-8deg)}}
@keyframes arrive{0%{transform:scale(.65);opacity:.3}65%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.idle #player-portrait{animation:float 2.5s ease-in-out infinite;}
.moving #player-portrait{animation:dash .14s ease-in-out infinite;}
.arrive #player-portrait{animation:arrive .4s cubic-bezier(.175,.885,.32,1.275) forwards;}
#mm-wrap{position:absolute;top:10px;right:10px;z-index:20;background:rgba(2,4,2,.95);border:1px solid rgba(200,160,32,.28);}
#mm-wrap::before{content:'MAP';position:absolute;top:3px;left:5px;z-index:2;font-family:'Cinzel',serif;font-size:7px;color:rgba(200,160,32,.28);letter-spacing:2px;}
#zoom-ctrl{position:absolute;bottom:12px;left:12px;z-index:20;display:flex;flex-direction:column;align-items:center;gap:4px;}
.zbtn{width:30px;height:30px;cursor:pointer;background:rgba(2,4,2,.92);border:1px solid rgba(200,160,32,.28);color:var(--gold);font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;transition:all .15s;}
.zbtn:hover{background:rgba(200,160,32,.14);border-color:var(--gold);}
#zlabel{font-family:'Cinzel',serif;font-size:8px;color:var(--gold-d);letter-spacing:1px;padding:2px 6px;background:rgba(2,4,2,.88);border:1px solid rgba(200,160,32,.16);min-width:36px;text-align:center;}
#panel{flex-shrink:0;min-height:154px;z-index:10;position:relative;background:linear-gradient(180deg,#040804,#080d06);border-top:1px solid var(--gold-d);display:flex;flex-direction:column;align-items:stretch;overflow:hidden;}
#panel-top{display:flex;align-items:stretch;flex:1;min-height:0;}
#panel-actions{flex-shrink:0;display:flex;flex-direction:row;align-items:center;justify-content:center;flex-wrap:wrap;gap:12px 18px;padding:14px 20px 16px;border-top:1px solid rgba(200,160,32,.16);background:linear-gradient(180deg,rgba(8,12,8,.92),rgba(4,8,4,.88));}
#panel-actions .nbtn{width:auto;min-width:120px;padding:14px 28px;font-size:13px;letter-spacing:3px;border-radius:10px;font-weight:600;}
#panel-actions #hdr-nest-btn{padding:14px 32px;font-size:12px;letter-spacing:3px;border-radius:10px;font-weight:600;}
#panel-actions #hdr-bird-btn{padding:8px 14px;}
#panel-actions #hdr-bird-btn span{font-size:10px;}
#panel-actions #hdr-bird-img{width:36px;height:36px;}
#panel-actions #hdr-shiny-count{padding:10px 16px;font-size:11px;}
#panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-l),var(--gold),transparent);}
#p-portrait{flex-shrink:0;width:138px;background:linear-gradient(135deg,#030603,#0a1207);border-right:1px solid rgba(200,160,32,.14);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px;position:relative;}
#p-portrait::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(200,160,32,.05) 0%,transparent 70%);}
#p-frame{width:92px;height:92px;border-radius:50%;border:2px solid var(--gold);background:#060e05;overflow:hidden;box-shadow:0 0 16px rgba(200,160,32,.38),inset 0 0 18px rgba(0,0,0,.5);position:relative;z-index:1;}
#p-frame svg{width:100%;height:100%;display:block;}
#p-name{font-family:'Cinzel',serif;font-size:7px;color:var(--gold);letter-spacing:2px;position:relative;z-index:1;text-transform:uppercase;}
#p-info{flex:1;padding:12px 16px;display:flex;flex-direction:column;justify-content:center;gap:5px;min-width:0;}
#i-label{font-family:'Cinzel',serif;font-size:7px;color:var(--gold-d);letter-spacing:3px;text-transform:uppercase;}
#i-name{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--gold-l);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#i-terrain{font-family:'EB Garamond',serif;font-size:12px;font-style:italic;color:var(--mist);}
#i-status{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;color:var(--gold-d);text-transform:uppercase;}
#i-rewards{font-family:'EB Garamond',serif;font-size:12px;color:var(--parch);}
#i-enemies{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px;}
#i-enemies .el{font-family:'Cinzel',serif;font-size:7px;color:var(--gold-d);letter-spacing:2px;}
.ec{font-family:'EB Garamond',serif;font-size:11px;background:rgba(200,160,32,.07);border:1px solid rgba(200,160,32,.18);color:var(--parch);padding:1px 7px;}
.ec.boss{background:rgba(139,26,26,.14);border-color:rgba(200,80,80,.28);color:#ff9090;}
.nbtn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;background:rgba(200,160,32,.06);border:1px solid rgba(200,160,32,.22);color:var(--gold);padding:12px 14px;cursor:pointer;text-align:center;transition:all .2s;border-radius:8px;}
.nbtn:hover:not(:disabled){background:rgba(200,160,32,.15);border-color:var(--gold);}
.nbtn:disabled{opacity:.16;cursor:default;}
#ov{display:none;position:fixed;inset:0;z-index:100;background:rgba(2,4,2,.97);flex-direction:column;align-items:center;justify-content:center;gap:13px;cursor:pointer;}
#ov.on{display:flex;}
#ov-frame{border:1px solid var(--gold-d);padding:28px 36px;display:flex;flex-direction:column;align-items:center;gap:11px;background:linear-gradient(135deg,#050905,#090e07);box-shadow:0 0 36px rgba(200,160,32,.12);position:relative;}
#ov-frame::before,#ov-frame::after{content:'❧';position:absolute;color:var(--gold-d);font-size:18px;opacity:.4;}
#ov-frame::before{top:7px;left:10px;}#ov-frame::after{bottom:7px;right:10px;transform:rotate(180deg);}
#ov-port{width:128px;height:128px;border-radius:50%;border:2px solid var(--gold);background:#060e05;overflow:hidden;box-shadow:0 0 20px rgba(200,160,32,.45);}
#ov-port svg{width:100%;height:100%;display:block;}
.ov-lbl{font-family:'Cinzel',serif;font-size:8px;color:var(--gold-d);letter-spacing:5px;}
#ov-name{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--gold-l);letter-spacing:2px;margin-top:3px;text-align:center;}
#ov-loc{font-family:'EB Garamond',serif;font-size:12px;font-style:italic;color:var(--mist);}
#ov-status{font-family:'Cinzel',serif;font-size:8px;color:var(--gold-d);letter-spacing:2px;text-transform:uppercase;text-align:center;}
#ov-meta{display:flex;flex-direction:column;gap:4px;align-items:center;max-width:340px;}
#ov-meta .ov-meta-line{font-family:'EB Garamond',serif;font-size:13px;color:var(--parch);text-align:center;line-height:1.35;}
#ov-meta .ov-meta-line strong{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;color:var(--gold-d);margin-right:6px;text-transform:uppercase;}
#ov-enemies{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-items:stretch;max-width:440px;margin:8px auto 0;line-height:normal;font-family:'EB Garamond',serif;font-size:12px;color:var(--parch);text-align:center;}
.ov-enemy-card{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:10px 12px;border:1px solid rgba(200,160,32,.22);background:rgba(200,160,32,.06);border-radius:8px;transition:background .2s,border-color .2s;max-width:160px;}
.ov-enemy-card:hover,.ov-enemy-card:focus-visible{border-color:var(--gold);background:rgba(200,160,32,.14);outline:none;}
.ov-enemy-sprite{width:56px;height:56px;border-radius:6px;background-size:200% 200%;background-position:0% 0%;image-rendering:pixelated;background-color:rgba(0,0,0,.28);}
.ov-enemy-name{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;color:var(--gold-l);text-transform:uppercase;}
.ov-enemy-meta{font-size:11px;color:var(--parch);line-height:1.3;}
#ov-enemies.ov-enemies--pool{flex-direction:column;flex-wrap:nowrap;align-items:stretch;gap:2px;max-width:420px;max-height:min(42vh,220px);overflow-y:auto;overflow-x:hidden;text-align:left;padding:4px 8px;margin:8px auto 0;border:1px solid rgba(200,160,32,.14);border-radius:8px;background:rgba(2,4,2,.5);line-height:normal;font-family:'EB Garamond',serif;font-size:12px;color:var(--parch);}
.ov-enemy-pool-hint{font-family:'EB Garamond',serif;font-size:12px;color:var(--gold-d);font-style:italic;margin:0 0 8px 0;line-height:1.3;text-align:center;}
.ov-enemy-row{display:flex;align-items:center;gap:10px;padding:6px 4px;border-bottom:1px solid rgba(200,160,32,.1);cursor:pointer;text-align:left;}
.ov-enemy-row:last-child{border-bottom:none;}
.ov-enemy-row:hover,.ov-enemy-row:focus-visible{background:rgba(200,160,32,.08);outline:none;}
.ov-enemy-row-sprite{width:40px;height:40px;flex-shrink:0;border-radius:4px;background-size:200% 200%;background-position:0% 0%;image-rendering:pixelated;background-color:rgba(0,0,0,.28);}
.ov-enemy-row-text{flex:1;min-width:0;}
.ov-enemy-row-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;color:var(--gold-l);text-transform:uppercase;}
.ov-enemy-row-meta{font-family:'EB Garamond',serif;font-size:11px;color:var(--parch);line-height:1.25;}
#ov-bird-popup{display:none;position:fixed;inset:0;z-index:1200;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.62);}
#ov-bird-popup.on{display:flex;}
.ov-bird-popup-frame{position:relative;max-width:340px;width:100%;padding:22px 20px 18px;border:1px solid rgba(200,160,32,.35);border-radius:10px;background:linear-gradient(145deg,#050905,#0c120a);box-shadow:0 16px 48px rgba(0,0,0,.5);}
#ov-bird-popup-close{position:absolute;top:6px;right:10px;background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;line-height:1;padding:4px 8px;}
#ov-bird-popup-close:hover{color:var(--gold-l);}
#ov-bird-popup-sprite{width:72px;height:72px;margin:0 auto 10px;border-radius:8px;background-size:200% 200%;background-position:0% 0%;image-rendering:pixelated;background-color:rgba(0,0,0,.35);}
#ov-bird-popup-sprite.ov-bird-popup-sprite--empty{opacity:.4;}
#ov-bird-popup-name{font-family:'Cinzel Decorative',serif;font-size:15px;color:var(--gold-l);text-align:center;margin-bottom:8px;}
#ov-bird-popup-meta{font-family:'EB Garamond',serif;font-size:13px;color:var(--parch);line-height:1.45;text-align:center;margin-bottom:12px;}
#ov-bird-popup-abilities{font-family:'EB Garamond',serif;font-size:13px;color:var(--parch);line-height:1.4;}
#ov-bird-popup-abilities ul{margin:0;padding-left:1.1em;}
#ov-bird-popup-abilities li{margin:5px 0;}
.ov-dismiss{font-family:'Cinzel',serif;font-size:7px;color:rgba(200,160,32,.22);margin-top:4px;letter-spacing:3px;}
#ov-confirm-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;padding:10px 30px;cursor:pointer;border:1px solid var(--gold-d);background:rgba(200,160,32,.08);color:var(--gold);transition:all .2s;margin-top:10px;display:none;}
#ov-confirm-btn:hover{background:rgba(200,160,32,.22);border-color:var(--gold);color:var(--gold-l);}
#ov-confirm-btn.is-shop{border-color:#988028;color:#f0c020;}#ov-confirm-btn.is-shop:hover{background:rgba(152,128,40,.2);}
#ov-confirm-btn.is-boss{border-color:#882020;color:#ff9090;}#ov-confirm-btn.is-boss:hover{background:rgba(136,32,32,.2);}
#ov-confirm-btn:disabled{opacity:.35;cursor:not-allowed;}
.node-done>circle:first-of-type,.node-done>ellipse{opacity:.35!important;}
.node-done .node-label-txt{fill:rgba(136,112,48,.3)!important;}
.node-locked>circle:first-of-type,.node-locked>ellipse{opacity:.22!important;filter:grayscale(.85) brightness(.55);}
.node-locked .node-label-txt{fill:rgba(80,72,48,.22)!important;}
.node-available>circle:first-of-type,.node-available>ellipse{filter:drop-shadow(0 0 6px rgba(200,160,48,.55));}
#pick{display:none;position:fixed;inset:0;z-index:110;background:rgba(2,4,2,.98);flex-direction:column;align-items:center;padding:18px;gap:10px;overflow-y:auto;}
#pick.on{display:flex;}
#pick h2{font-family:'Cinzel Decorative',serif;font-size:12px;color:var(--gold-l);letter-spacing:3px;}
#pick-div{width:260px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
#pick-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:840px;}
.bc{background:linear-gradient(135deg,#050905,#0b1508);border:1px solid rgba(200,160,32,.18);padding:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;width:88px;transition:all .2s;}
.bc:hover{border-color:var(--gold);}.bc.sel{border-color:var(--gold-l);}
.bc .cp{width:54px;height:54px;border-radius:50%;border:1px solid rgba(200,160,32,.25);background:#060e05;overflow:hidden;}
.bc .cp svg{width:100%;height:100%;display:block;}
.bc .cp .pick-sprite{width:100%;height:100%;background-size:200% 200%;background-position:0% 0%;background-repeat:no-repeat;image-rendering:pixelated;}
.bc span{font-family:'Cinzel',serif;font-size:6px;color:var(--gold);letter-spacing:1px;text-align:center;}
#pick-ok{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;background:rgba(200,160,32,.07);border:1px solid var(--gold-d);color:var(--gold);padding:9px 22px;cursor:pointer;margin-top:4px;transition:all .2s;}
#pick-ok:hover{background:rgba(200,160,32,.16);border-color:var(--gold);}

/* ── Nest button ─────────────────────────────────────────────── */
#hdr-nest-btn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;background:rgba(200,160,32,.06);border:1px solid rgba(200,160,32,.22);color:var(--gold);padding:5px 14px;cursor:pointer;transition:all .2s;white-space:nowrap;}
#hdr-nest-btn:hover{background:rgba(200,160,32,.18);border-color:var(--gold);}
#hdr-shiny-count{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:1px;background:rgba(200,160,32,.06);border:1px solid rgba(200,160,32,.22);padding:5px 10px;white-space:nowrap;}

/* ── Mobile layout ───────────────────────────────────────────── */
@media (max-width:640px){
  html,body,#root{height:100%;min-height:0;}
  #root{height:calc(var(--vh,1vh)*100);}
  #hdr{height:44px;padding:0 10px;gap:6px;}
  #hdr h1{font-size:10px;letter-spacing:1px;}
  .orn{margin:0 4px;font-size:12px;}
  #hdr-hint{display:none;}
  #panel-actions{gap:10px;padding:10px 12px;}
  #panel-actions .nbtn{min-width:100px;padding:12px 16px;font-size:11px;}
  #panel-actions #hdr-nest-btn{padding:12px 20px;font-size:10px;}
  #panel-actions #hdr-bird-img{width:28px;height:28px;}
  /* Map viewport fills remaining space above bottom nav */
  #vp{flex:1;min-height:0;}
  /* Panel becomes a slim row + full-width nav bar below it */
  #panel{height:auto;}
  #panel-top{flex-wrap:wrap;}
  #p-portrait{width:72px;padding:6px;}
  #p-frame{width:54px;height:54px;}
  #p-name{font-size:6px;}
  #p-info{padding:8px 10px;flex:1;min-width:0;}
  #i-name{font-size:12px;}
  .nbtn{min-width:0;}
  /* Minimap: smaller + shifted */
  #mm-wrap{top:6px;right:6px;}
  /* Zoom controls: smaller */
  .zbtn{width:26px;height:26px;font-size:14px;}
  #zoom-ctrl{bottom:8px;left:8px;}
}

/* Nest overlay (in-map preview via iframe — same UI as main game nest) */
.ow-nest-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(2,4,2,.94);flex-direction:column;align-items:center;justify-content:center;padding:12px;box-sizing:border-box;}
.ow-nest-overlay.open{display:flex;}
.ow-nest-overlay-frame{width:100%;max-width:min(740px,100%);height:min(92vh,840px);display:flex;flex-direction:column;background:#0a0c0f;border:1px solid rgba(200,160,32,.38);border-radius:12px;overflow:hidden;box-shadow:0 16px 56px rgba(0,0,0,.65);}
.ow-nest-overlay-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(180deg,#080c06,#040804);border-bottom:1px solid rgba(200,160,32,.22);}
.ow-nest-overlay-title{font-family:Cinzel,serif;font-size:10px;letter-spacing:3px;color:var(--gold-l);}
.ow-nest-overlay-close{background:rgba(200,160,32,.08);border:1px solid rgba(200,160,32,.32);color:var(--gold);border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;}
.ow-nest-overlay-close:hover{background:rgba(200,160,32,.2);border-color:var(--gold);}
.ow-nest-overlay-iframe{flex:1;width:100%;border:0;background:#0a0c0f;min-height:0;}
</style>
</head>
<body>
<div id="root" tabindex="0">
  <header id="hdr">
    <div class="hdr-title-wrap">
      <span class="orn">&#10022;</span><h1>BLACKSTONE FOREST</h1><span class="orn">&#10022;</span>
    </div>
    <span id="hdr-hint">Choose a node &middot; Enter opens travel panel &middot; B = Bird &middot; Scroll / pinch = Zoom &middot; Drag = Pan</span>
    <div class="hdr-spacer" aria-hidden="true"></div>
  </header>
  <div id="vp">
    <div id="scaler">
      <div id="mw">
        <img id="bg-img" src="assets/overworld_map.png" alt="">
        <svg id="node-svg" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="player" class="idle">
          <div id="player-portrait"><div id="player-img" style="width:100%;height:100%;"></div></div>
        </div>
      </div>
    </div>
    <div id="mm-wrap"><canvas id="mm" width="164" height="110"></canvas></div>
    <div id="zoom-ctrl">
      <button class="zbtn" id="zin">+</button>
      <div id="zlabel">65%</div>
      <button class="zbtn" id="zout">&#8722;</button>
    </div>
  </div>
  <div id="panel">
    <div id="panel-top">
      <div id="p-portrait">
        <div id="p-frame"><div id="p-img" style="width:100%;height:100%;"></div></div>

// Mobile viewport height fix (accounts for browser chrome on iOS/Android)
function setVH(){document.documentElement.style.setProperty('--vh',(window.innerHeight*.01)+'px');}
setVH();window.addEventListener('resize',setVH);

// How many stages the player has completed — set by the integration bootstrap script
let currentCompletedStage = 0;
const OVERWORLD_PROGRESS = {completedStage:0,currentNodeId:0,lastSummary:null};

function syncOverworldProgress(progress={}){
  OVERWORLD_PROGRESS.completedStage=Math.max(0,Math.floor(Number(progress.completedStage)||0));
  OVERWORLD_PROGRESS.currentNodeId=Math.max(0,Math.floor(Number(progress.currentNodeId)||0));
  OVERWORLD_PROGRESS.lastSummary=(progress.lastSummary&&typeof progress.lastSummary==='object')?progress.lastSummary:null;
  currentCompletedStage=OVERWORLD_PROGRESS.completedStage;
}

function getCurrentActionableStage(){ return Math.max(1, OVERWORLD_PROGRESS.completedStage + 1); }
function isCombatNode(n){ return isOwCombatNode(n); }
function getNodePortraitBird(n){ return n?.portraitBird || ''; }
function inferCompletedStageFromNodeId(nodeId){
  return inferOwCompletedStageFromNodeId(nodeId, NODES);
}
function getNodeBattleCount(n){ if(!n)return 0; if(!isCombatNode(n))return 0; var st=Math.max(1,Math.floor(Number(n.stage)||1)); if(typeof isBossStageStory==='function'&&isBossStageStory(st))return 1; if(typeof getStoryEncounterChainCount==='function')return getStoryEncounterChainCount(st); return 2; }
function isNodeCompleted(n){
  if(!n) return false;
  if(isCombatNode(n)) return Number(n.stage||0) <= OVERWORLD_PROGRESS.completedStage;
  if(n.type==='shop'){
    const prev=NODES[n.id-1];
    return Number(prev?.stage||0) <= OVERWORLD_PROGRESS.completedStage;
  }
  return n.type==='start';
}
function isActionable(n){
  if(!n || n.type==='start') return false;
  if(isCombatNode(n)) return Number(n.stage||0) === getCurrentActionableStage();
  if(n.type==='shop'){
    const prev=NODES[n.id-1];
    return OVERWORLD_PROGRESS.completedStage >= Number(prev?.stage||0);
  }
  return false;
}
function isNodeUnlocked(n){
  if(!n||n.type==='start') return true;
  if(n.type==='shop'){
    const prev=NODES[n.id-1];
    return (OVERWORLD_PROGRESS.completedStage||0) >= Number(prev?.stage||0);
  }
  if(isCombatNode(n)){
    return (OVERWORLD_PROGRESS.completedStage||0) >= Number(n.stage||1)-1;
  }
  return false;
}
function syncNodeVisualState(){
  NODES.forEach(n=>{
    if(!n._g||n.type==='start') return;
    n._g.classList.remove('node-locked','node-available');
    if(!isNodeUnlocked(n)) n._g.classList.add('node-locked');
    else if(isActionable(n)) n._g.classList.add('node-available');
  });
}
function getNodeLockReason(n){
  if(!n || n.type==='start') return '';
  if(isActionable(n)) return 'Available now';
  if(isNodeCompleted(n)) return 'Cleared';
  if(isCombatNode(n)) return `Clear Stage ${Math.max(1,(Number(n.stage)||1)-1)} first`;
  if(n.type==='shop'){
    const prev=NODES[n.id-1];
    return `Clear Stage ${Math.max(1,Number(prev?.stage||1))} first`;
  }
  return '';
}
function getShinyRangeForStage(stage,isBoss){
  stage=Math.max(1,Number(stage)||1);
  if(isBoss){
    if(stage>=20) return [75,110];
    if(stage>=10) return [55,75];
    return [40,55];
  }
  return stage<10 ? [20,30] : [30,45];
}
function getNodeRewardPreview(n){
  if(!n || n.type==='start') return '';
  if(n.type==='shop') return 'Static stock after first visit. Refreshing rerolls and re-locks the shelf.';
  const last=OVERWORLD_PROGRESS.lastSummary;
  if(last && Number(last.stage)===Number(n.stage) && Number(last.shinyGain)>0){
    return `Last Clear: +${Number(last.shinyGain)} shinies across ${Math.max(1,Number(last.enemiesDefeated)||1)} battle${Math.max(1,Number(last.enemiesDefeated)||1)===1?'':'s'}.`;
  }
  const count=Math.max(1,getNodeBattleCount(n));
  const [lo,hi]=getShinyRangeForStage(n.stage,n.type==='boss'||n.final);
  return `Reward Preview: ${lo*count}-${hi*count} shinies total · ${count} battle${count===1?'':'s'}.`;
}
function applyNodeActionButton(btn,n){
  if(!btn || !n || n.type==='start'){ if(btn) btn.style.display='none'; return; }
  const ok=isActionable(n);
  btn.style.display='block';
  btn.disabled=!ok;
  btn.className='';
  if(n.type==='shop'){ btn.textContent=ok?'ENTER SHOP ▶':'SHOP LOCKED'; btn.classList.add('is-shop'); return; }
  if(n.type==='boss'||n.final){ btn.textContent=ok?'FACE BOSS ▶':'BOSS LOCKED'; btn.classList.add('is-boss'); return; }
  btn.textContent=ok?`ENTER STAGE ${n.stage} ▶`:`LOCKED · STAGE ${n.stage}`;
}

document.getElementById('root').addEventListener('keydown',e=>{
  if(document.getElementById('pick').classList.contains('on')){if(e.key==='Escape'){document.getElementById('pick').classList.remove('on');document.getElementById('root').focus();}return;}
  if(document.getElementById('ov').classList.contains('on')){
    if(e.key==='Escape'){
      if(document.getElementById('ov-bird-popup').classList.contains('on')) closeOvBirdPopup();
      else document.getElementById('ov').classList.remove('on');
    }
    return;
  }
  if(e.key==='b'||e.key==='B'){document.getElementById('hdr-bird-btn').click();return;}
  if(e.key==='='||e.key==='+'){e.preventDefault();setZoom(zoom+ZOOM_STEP);return;}
  if(e.key==='-'){e.preventDefault();setZoom(zoom-ZOOM_STEP);return;}
  if(e.key==='0'){e.preventDefault();zoom=0.65;updateCamera(true);return;}
  if((e.key==='Enter'||e.key===' ')&&!isMoving){e.preventDefault();_openNodeOv();return;}
  const dirs=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
  if(!dirs.includes(e.key))return;e.preventDefault();if(isMoving)return;
  const cn=NODES[curPos],cands=[];
  if(curPos>0)cands.push(NODES[curPos-1]);if(curPos<UNLOCKED)cands.push(NODES[curPos+1]);
  const openCands=cands.filter(c=>isNodeUnlocked(c));
  if(!openCands.length)return;let best=null,bs=-Infinity;
  for(const c of openCands){const dx=c.x-cn.x,dy=c.y-cn.y;const sc=e.key==='ArrowRight'?dx-Math.abs(dy)*.4:e.key==='ArrowLeft'?-dx-Math.abs(dy)*.4:e.key==='ArrowUp'?-dy-Math.abs(dx)*.4:dy-Math.abs(dx)*.4;if(sc>bs){bs=sc;best=c.id;}}
  if(best!==null)setPos(best);
});

// Returns true if the current node must be cleared before advancing
function nodeBlocksAdvance(n){
  if(!n) return false;
  if(n.type==='start'||n.type==='shop') return false;
  // stage/boss/final: must be completed (stage <= completedStage)
  return typeof n.stage==='number' && n.stage > currentCompletedStage;
}

<script src="js/data/story_enemy_registry.js"></script><script src="js/data/story_milestone_boss_pool.js"></script><script src="js/world/ow_enemy_population.js"></script>
<script>
// ── Avian Ascent · Overworld Integration Bootstrap ───────────────────────────
(function(){
  let save = readOwSaveParsed();
  let owState = readOwStateParsed();

  // Per-run seeded stage enemies (story overworld): validate/create pack, patch NODES, persist.
  if (typeof buildOwEnemyPopulation === 'function' && typeof applyOwPopulationToNodes === 'function' && typeof isValidOverworldEnemySeedPack === 'function' && typeof mulberry32 === 'function' && typeof OW_PACK_SEED_COUNT === 'number') {
    if (save?.player && !save.endlessMode) {
      let pack = save.overworldEnemySeedPack;
      let dirty = false;
      if (!isValidOverworldEnemySeedPack(pack)) {
        const r = mulberry32(Date.now() >>> 0);
        pack = { v: 1, packIndex: Math.floor(r() * OW_PACK_SEED_COUNT) };
        save.overworldEnemySeedPack = pack;
        dirty = true;
      }
      const pop = buildOwEnemyPopulation(pack.packIndex);
      applyOwPopulationToNodes(NODES, pop);
      if (dirty) {
        try { localStorage.setItem(AVIAN_OW_KEYS.SAVE, JSON.stringify(save)); } catch (_) {}
      }
    } else if (save && !save.player && save.overworldEnemySeedPack != null) {
      delete save.overworldEnemySeedPack;
      try { localStorage.setItem(AVIAN_OW_KEYS.SAVE, JSON.stringify(save)); } catch (_) {}
    }
  }

  const overworldProgress = mergeOverworldBootstrapProgress({
    savedProgress: save?.overworldProgress || null,
    owState,
    saveStage: save?.stage,
    nodes: NODES,
  });
  const activeBirdKey  = save?.player?.birdKey || owState?.birdKey || null;
  const currentStage   = Math.max(1, overworldProgress.completedStage + 1);
  const shinyObjects   = save ? (save.shinyObjects || 0) : null;
  const hasActiveRun   = !!(save?.player);

  // ── Apply the player's bird as the overworld sprite ──────────────────────
  if (activeBirdKey) {
    const idx = BIRDS.findIndex(b => b.k === activeBirdKey);
    if (idx >= 0) {
      birdIdx = idx;
      applyBird();
    } else if (SPRITES[activeBirdKey]) {
      // Sprite exists but no BIRDS array entry (shouldn't happen after full sync)
      const src = SPRITES[activeBirdKey];
      const label = activeBirdKey.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase()).trim();
      _owSprite('player-img', src);
      _owSprite('hdr-bird-img', src);
      document.getElementById('hdr-bird-name').textContent = label.toUpperCase();
      const n0 = NODES[curPos];
      if (n0 && n0.type !== 'shop') {
        const pf = document.getElementById('p-frame');
        if (pf) {
          pf.innerHTML = '<div id="p-img" style="width:100%;height:100%;"></div>';
          _owSprite('p-img', src);
          const pi = document.getElementById('p-img');
          if (pi) pi.style.borderRadius = '0';
        }
        const pnm = document.getElementById('p-name');
        if (pnm) pnm.textContent = label.toUpperCase();
      }
    }
  }

  // ── Lock the standalone bird-picker when a run is active ─────────────────
  if (hasActiveRun) {
    const hdrBtn = document.getElementById('hdr-bird-btn');
    if (hdrBtn) {
      const locked = hdrBtn.cloneNode(true);
      locked.style.cursor = 'default';
      locked.title = 'Bird locked during run';
      // no click handler — no-op
      hdrBtn.parentNode.replaceChild(locked, hdrBtn);
    }
  }

  // ── Expose completed stage count to the global movement-gating logic ────
  syncOverworldProgress(overworldProgress);
  try{ syncNodeVisualState(); }catch(_){ }

  // ── Update shinies counter in the static header element ─────────────────
  const shinyEl = document.getElementById('hdr-shiny-count');
  if (shinyEl && shinyObjects !== null) {
    shinyEl.textContent = '\u2B50 ' + shinyObjects;
  }

  // ── Determine which node a stage maps to ─────────────────────────────────
  function nodeForStage(stageNum) {
    return NODES.find(n => n.stage === stageNum) || null;
  }

  // ── Position player at the current-stage node ─────────────────────────────
  let startNode = overworldProgress.currentNodeId || 0;
  if (startNode === 0 && currentStage > 1) {
    const target = nodeForStage(currentStage);
    if (target) startNode = target.id;
  }
  if (startNode !== 0) {
    const pl = document.getElementById('player');
    pl.style.transition = 'none';
    setHL(0, false);
    curPos = startNode;
    const n = NODES[curPos];
    pl.style.left = (n.x - 26) + 'px';
    pl.style.top  = (n.y - 60) + 'px';
    setHL(curPos, true);
    updateCamera(false);
    updateInfo();
    requestAnimationFrame(() => requestAnimationFrame(() => {
      pl.style.transition = 'left .5s cubic-bezier(.25,.46,.45,.94),top .5s cubic-bezier(.25,.46,.45,.94)';
    }));
  }

  // ── Mark completed stage nodes with a ✓ checkmark ────────────────────────
  if (overworldProgress.completedStage > 0) {
    NODES.forEach(n => {
      if (isCombatNode(n) && n.stage <= overworldProgress.completedStage && n._g && !n._g.dataset.done) {
        n._g.dataset.done = '1';
        n._g.classList.add('node-done');
        const tick = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        tick.setAttribute('x', String(n.x));
        tick.setAttribute('y', String(n.y - 22));
        tick.setAttribute('text-anchor', 'middle');
        tick.setAttribute('font-family', 'Cinzel,serif');
        tick.setAttribute('font-size', '10');
        tick.setAttribute('fill', 'rgba(200,160,32,.5)');
        tick.textContent = '\u2713';
        n._g.appendChild(tick);
      }
    });
  }

  // ── Wire the confirm button (navigation to index.html) ───────────────────
  const confirmBtn = document.getElementById('ov-confirm-btn');

  if (confirmBtn) {
    confirmBtn.addEventListener('click', function(e) {
      e.stopPropagation(); // don't dismiss the overlay backdrop
      const n = NODES[curPos];
      if (!n || n.type === 'start' || !isActionable(n)) return;

      persistOwMapSnapshot(curPos, activeBirdKey);

      if (n.type === 'shop') {
        persistOwNavIntent({action:'shop', nodeId:curPos});
      } else {
        persistOwNavIntent({action:'battle', nodeId:curPos, stage:n.stage, terrain:n.terrain||''});
      }

      window.location.href = 'index.html';
    });
  }

  // ── Keep ESC closing the overlay ──────────────────────────────────────────
  // (already handled by the existing keyboard listener — no changes needed)

})();
</script>
